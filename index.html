<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assong's Step Up Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --bg:#ffffff; --surface:#f6f8fc; --surface2:#e8ebf5;
      --border:#dde2ee; --text:#1a1f2e; --text-muted:#7a8299; --text-dim:#b8bfcc;
      --c1:#60a5fa; --c2:#2563eb; --c3:#c4b5fd; --c4:#7c3aed;
      --accent:#3b82f6; --red:#f87171; --green:#4ade80;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}

    /* ── HEADER: 2줄 ── */
    header{
      display:flex;flex-direction:column;
      padding:0.3rem 0.8rem 0.28rem;
      border-bottom:1px solid var(--border);
      background:var(--bg);position:sticky;top:0;z-index:10;gap:0.18rem;
    }
    .header-row1{display:flex;align-items:center;justify-content:space-between;gap:0.5rem;}
    .header-row2{display:flex;align-items:center;justify-content:space-between;gap:0.5rem;}
    h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.1rem,3.5vw,1.65rem);
       letter-spacing:0.04em;line-height:1;white-space:nowrap;flex-shrink:0;}
    h1 span{color:var(--accent);}
    .clock-area{display:flex;align-items:baseline;gap:0.35rem;flex-shrink:0;}
    #clock{font-family:'Bebas Neue',sans-serif;font-size:clamp(0.95rem,3vw,1.45rem);
           letter-spacing:0.06em;color:var(--accent);line-height:1;}
    #date-str{font-size:0.58rem;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase;}
    .stats-inline{display:flex;align-items:center;gap:0.45rem;flex-wrap:nowrap;}
    .stat-pill{display:flex;align-items:baseline;gap:2px;font-size:0.58rem;color:var(--text-muted);white-space:nowrap;}
    .stat-pill strong{font-family:'Bebas Neue',sans-serif;font-size:0.85rem;color:var(--accent);font-weight:400;}
    .stat-div{width:1px;height:9px;background:var(--border);flex-shrink:0;}
    .legend-inline{display:flex;align-items:center;gap:2px;flex-shrink:0;}
    .legend-dot{width:8px;height:8px;border-radius:1.5px;}
    .legend-dot.l0{background:var(--surface2)}.legend-dot.l1{background:var(--c1)}
    .legend-dot.l2{background:var(--c2)}.legend-dot.l3{background:var(--c3)}
    .legend-dot.l4{background:var(--c4)}
    .legend-arr{font-size:0.5rem;color:var(--text-dim);}
    .header-actions{display:flex;align-items:center;gap:0.35rem;flex-shrink:0;}
    #sync-status{display:flex;align-items:center;gap:4px;font-size:0.56rem;color:var(--text-dim);white-space:nowrap;}
    #sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);transition:background 0.3s;flex-shrink:0;}
    #sync-dot.ok{background:var(--green)}
    #sync-dot.err{background:var(--red)}
    #sync-dot.loading{background:#facc15;animation:pulse 0.8s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .icon-btn{background:none;border:1px solid var(--border);color:var(--text-muted);
      font-size:0.56rem;letter-spacing:0.05em;text-transform:uppercase;padding:2px 6px;
      border-radius:3px;cursor:pointer;transition:border-color 0.15s,color 0.15s;
      white-space:nowrap;font-family:'DM Sans',sans-serif;}
    .icon-btn.danger:hover{border-color:var(--red);color:var(--red);}

    /* ── GRID: 4×3, 768px 최적화 ── */
    .year-grid{
      display:grid;grid-template-columns:repeat(4,1fr);
      gap:0.3rem;padding:0.3rem 0.5rem 0.5rem;
    }
    .month-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:5px;padding:0.28rem 0.32rem 0.32rem;transition:border-color 0.2s;
    }
    .month-card.is-current{border-color:var(--accent);}
    .month-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:0.2rem;}
    .month-name{font-family:'Bebas Neue',sans-serif;font-size:0.68rem;letter-spacing:0.07em;color:var(--text-muted);}
    .month-card.is-current .month-name{color:var(--accent);}
    .month-count{font-size:0.42rem;color:var(--text-dim);}
    .month-card.is-current .month-count{color:var(--accent);}
    .dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:1px;}
    .dow-cell{text-align:center;font-size:0.36rem;color:var(--text-dim);padding:0.5px 0;}
    .dow-cell.sun{color:#f87171}.dow-cell.sat{color:#93c5fd}
    .day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
    .day-cell{aspect-ratio:1;border-radius:1.5px;cursor:pointer;transition:transform 0.08s,opacity 0.1s;position:relative;}
    .day-cell:active{transform:scale(0.80)}
    .day-cell.empty{background:transparent;cursor:default;pointer-events:none;}
    .day-cell.l0{background:var(--surface2)}
    .day-cell.l1{background:var(--c1)}
    .day-cell.l2{background:var(--c2)}
    .day-cell.l3{background:var(--c3)}
    .day-cell.l4{background:var(--c4)}
    .day-cell.today::after{content:'';position:absolute;inset:-1.5px;border-radius:3px;
      border:1.5px solid var(--accent);pointer-events:none;}
    .day-cell:hover:not(.empty){opacity:0.72;}
    @media(max-width:500px){.year-grid{grid-template-columns:repeat(3,1fr);}}
  </style>
</head>
<body>

<header>
  <!-- 1행: 제목 + 시계 -->
  <div class="header-row1">
    <h1><span>Assong</span>'s Step Up Tracker</h1>
    <div class="clock-area">
      <div id="clock">00:00:00</div>
      <div id="date-str"></div>
    </div>
  </div>
  <!-- 2행: stats + legend / sync + reset -->
  <div class="header-row2">
    <div class="stats-inline">
      <div class="stat-pill"><strong id="stat-total">0</strong> logs</div>
      <div class="stat-div"></div>
      <div class="stat-pill"><strong id="stat-days">0</strong> active</div>
      <div class="stat-div"></div>
      <div class="stat-pill"><strong id="stat-streak">0</strong> streak</div>
      <div class="stat-div"></div>
      <div class="stat-pill"><strong id="stat-best">0</strong> best</div>
      <div class="stat-div"></div>
      <div class="legend-inline">
        <div class="legend-dot l0"></div><span class="legend-arr">›</span>
        <div class="legend-dot l1"></div><span class="legend-arr">›</span>
        <div class="legend-dot l2"></div><span class="legend-arr">›</span>
        <div class="legend-dot l3"></div><span class="legend-arr">›</span>
        <div class="legend-dot l4"></div>
      </div>
    </div>
    <div class="header-actions">
      <div id="sync-status">
        <div id="sync-dot" class="loading"></div>
        <span id="sync-label">연결 중...</span>
      </div>
      <button class="icon-btn danger" id="btn-reset">Reset</button>
    </div>
  </div>
</header>

<div class="year-grid" id="year-grid"></div>

<script>
/* ═══════════════════════════════════════════
   Firebase config — 도메인 제한으로 보안 처리
   (Firebase Console > API 제한 > HTTP 리퍼러)
═══════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBmAvPG55flO30aeZGaFFAC88A08IPuqTw",
  authDomain:        "step-up-tracker.firebaseapp.com",
  databaseURL:       "https://step-up-tracker-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "step-up-tracker",
  storageBucket:     "step-up-tracker.firebasestorage.app",
  messagingSenderId: "37754241844",
  appId:             "1:37754241844:web:9a037fb0e8af2422469b61"
};

/* ═══════════════════════════════════════════
   App constants
═══════════════════════════════════════════ */
const MONTH_NAMES = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const DOW         = ['S','M','T','W','T','F','S'];
const LS_KEY      = 'assong_v5';
const DB_PATH     = 'tracker/2026';

const _now        = new Date();
const CY          = _now.getFullYear();   // current year
const CM          = _now.getMonth();      // current month
const CD          = _now.getDate();       // current day

let state = {};
let dbRef = null;

/* ── local cache ── */
function loadLocal()  { try{return JSON.parse(localStorage.getItem(LS_KEY)||'{}')}catch{return{}} }
function saveLocal(s) { try{localStorage.setItem(LS_KEY,JSON.stringify(s))}catch{} }

/* ── sync indicator ── */
function setSyncStatus(cls, label) {
  document.getElementById('sync-dot').className = cls;
  document.getElementById('sync-label').textContent = label;
}

/* ═══════════════════════════════════════════
   Firebase — init & real-time listener
═══════════════════════════════════════════ */
function startFirebase() {
  try {
    const app = firebase.initializeApp(FIREBASE_CONFIG);
    const db  = firebase.database(app);
    dbRef     = db.ref(DB_PATH);

    // 모든 클라이언트가 실시간으로 동일 데이터 수신
    dbRef.on('value', snapshot => {
      const remote = snapshot.val() || {};
      // Firebase 키는 언더스코어, 로컬은 대시로 변환
      const converted = {};
      Object.keys(remote).forEach(k => {
        converted[k.replace(/_/g, '-')] = remote[k];
      });
      state = converted;
      saveLocal(state);
      renderCalendars();
      renderStats();
      setSyncStatus('ok', '실시간 동기화');
    }, err => {
      console.error(err);
      setSyncStatus('err', '연결 오류');
    });
  } catch(e) {
    console.error(e);
    setSyncStatus('err', '설정 오류');
  }
}

/* ── 단일 날짜 쓰기 ── */
async function writeDay(localKey, value) {
  if (!dbRef) return;
  const fbKey = localKey.replace(/-/g, '_'); // 2026-04-28 → 2026_04_28
  try {
    await dbRef.child(fbKey).set(value === 0 ? null : value);
  } catch(e) {
    console.error(e);
    setSyncStatus('err', '저장 실패');
  }
}

/* ═══════════════════════════════════════════
   Helpers
═══════════════════════════════════════════ */
function dateKey(m, d) {
  return `${CY}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function daysInMonth(m) { return new Date(CY, m+1, 0).getDate(); }
function firstDow(m)    { return new Date(CY, m, 1).getDay(); }

/* ═══════════════════════════════════════════
   Stats
═══════════════════════════════════════════ */
function computeStats() {
  let total = 0, activeDays = 0;
  Object.values(state).forEach(v => { total += v; if (v > 0) activeDays++; });

  let streak = 0, d = new Date(CY, CM, CD);
  while (true) {
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (!state[k]) break;
    streak++; d.setDate(d.getDate() - 1);
  }

  let best = 0, run = 0;
  const keys = Object.keys(state).filter(k => state[k] > 0).sort();
  keys.forEach((k, i) => {
    if (i === 0) { run = 1; best = 1; return; }
    const diff = (new Date(k) - new Date(keys[i-1])) / 86400000;
    if (diff === 1) { run++; if (run > best) best = run; } else run = 1;
  });
  return { total, activeDays, streak, best };
}

function renderStats() {
  const s = computeStats();
  document.getElementById('stat-total').textContent  = s.total;
  document.getElementById('stat-days').textContent   = s.activeDays;
  document.getElementById('stat-streak').textContent = s.streak;
  document.getElementById('stat-best').textContent   = s.best;
}

/* ═══════════════════════════════════════════
   Calendar render
═══════════════════════════════════════════ */
function renderCalendars() {
  const grid = document.getElementById('year-grid');
  grid.innerHTML = '';

  for (let m = 0; m < 12; m++) {
    const isCurrent = (m === CM);
    const days = daysInMonth(m), offset = firstDow(m);
    let mActive = 0;
    for (let d = 1; d <= days; d++) if ((state[dateKey(m,d)] || 0) > 0) mActive++;

    const card = document.createElement('div');
    card.className = 'month-card' + (isCurrent ? ' is-current' : '');

    const hdr = document.createElement('div');
    hdr.className = 'month-header';
    hdr.innerHTML = `<div class="month-name">${MONTH_NAMES[m]}</div>` +
                    `<div class="month-count">${mActive > 0 ? mActive+'d' : ''}</div>`;
    card.appendChild(hdr);

    const dowRow = document.createElement('div');
    dowRow.className = 'dow-row';
    DOW.forEach((label, i) => {
      const c = document.createElement('div');
      c.className = 'dow-cell' + (i===0 ? ' sun' : i===6 ? ' sat' : '');
      c.textContent = label;
      dowRow.appendChild(c);
    });
    card.appendChild(dowRow);

    const dayGrid = document.createElement('div');
    dayGrid.className = 'day-grid';

    for (let i = 0; i < offset; i++) {
      const e = document.createElement('div');
      e.className = 'day-cell empty';
      dayGrid.appendChild(e);
    }

    for (let d = 1; d <= days; d++) {
      const k     = dateKey(m, d);
      const level = state[k] || 0;
      const cell  = document.createElement('div');
      cell.className = `day-cell l${level}` + (isCurrent && d === CD ? ' today' : '');
      cell.title     = `${MONTH_NAMES[m]} ${d}  ·  Lv ${level}`;
      cell.addEventListener('click', async () => {
        const next = ((state[k] || 0) + 1) % 5;
        state[k] = next;
        saveLocal(state);
        renderCalendars();
        renderStats();
        await writeDay(k, next);
      });
      dayGrid.appendChild(cell);
    }

    card.appendChild(dayGrid);
    grid.appendChild(card);
  }
}

/* ═══════════════════════════════════════════
   Reset
═══════════════════════════════════════════ */
document.getElementById('btn-reset').addEventListener('click', async () => {
  if (!confirm('모든 기록을 초기화할까요?')) return;
  state = {};
  saveLocal(state);
  renderCalendars();
  renderStats();
  if (dbRef) {
    try { await dbRef.set(null); }
    catch(e) { setSyncStatus('err', '초기화 실패'); }
  }
});

/* ═══════════════════════════════════════════
   Clock
═══════════════════════════════════════════ */
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
  const WD = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const MO = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('date-str').textContent =
    `${WD[n.getDay()]} ${n.getDate()} ${MO[n.getMonth()]} ${n.getFullYear()}`;
}

/* ═══════════════════════════════════════════
   Boot
═══════════════════════════════════════════ */
state = loadLocal();   // 캐시 즉시 표시
renderCalendars();
renderStats();
setInterval(updateClock, 1000);
updateClock();
startFirebase();       // Firebase 연결
</script>
</body>
</html>
