<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assong's Step Up Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f6f8fc;
      --surface2: #eaecf4;
      --border: #dde2ee;
      --text: #1a1f2e;
      --text-muted: #7a8299;
      --text-dim: #b8bfcc;
      --blue1: #dbeafe;
      --blue2: #93c5fd;
      --blue3: #3b82f6;
      --blue4: #1d4ed8;
      --accent: #3b82f6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1.6rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
      gap: 1rem;
      flex-wrap: nowrap;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1.4rem;
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.5rem, 2.5vw, 2.4rem);
      letter-spacing: 0.04em;
      line-height: 1;
      white-space: nowrap;
      flex-shrink: 0;
    }
    h1 span { color: var(--accent); }

    .stats-inline {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      flex-wrap: wrap;
    }

    .stat-pill {
      display: flex;
      align-items: baseline;
      gap: 4px;
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .stat-pill strong {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem;
      letter-spacing: 0.04em;
      color: var(--accent);
      font-weight: 400;
    }

    .stat-div {
      width: 1px;
      height: 12px;
      background: var(--border);
      flex-shrink: 0;
    }

    .legend-inline {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .legend-dot {
      width: 11px;
      height: 11px;
      border-radius: 2px;
    }
    .legend-dot.l0 { background: var(--surface2); }
    .legend-dot.l1 { background: var(--blue1); }
    .legend-dot.l2 { background: var(--blue2); }
    .legend-dot.l3 { background: var(--blue3); }
    .legend-dot.l4 { background: var(--blue4); }

    .legend-arr { font-size: 0.6rem; color: var(--text-dim); }

    .header-right {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    #clock {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.2rem, 2vw, 1.9rem);
      letter-spacing: 0.06em;
      color: var(--accent);
      line-height: 1;
    }

    #date-str {
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .reset-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 5px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .reset-btn:hover { border-color: var(--blue3); color: var(--blue3); }

    /* YEAR GRID: 4 cols x 3 rows */
    .year-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.8rem;
      padding: 0.8rem 1.6rem 1.6rem;
    }

    /* MONTH CARD */
    .month-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0.65rem 0.7rem 0.7rem;
      transition: border-color 0.2s;
    }
    .month-card.is-current { border-color: var(--accent); }

    .month-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 0.45rem;
    }

    .month-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem;
      letter-spacing: 0.07em;
      color: var(--text-muted);
    }
    .month-card.is-current .month-name { color: var(--accent); }

    .month-count {
      font-size: 0.58rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }
    .month-card.is-current .month-count { color: var(--blue3); }

    /* DOW row */
    .dow-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-bottom: 2px;
    }

    .dow-cell {
      text-align: center;
      font-size: 0.52rem;
      color: var(--text-dim);
      letter-spacing: 0.03em;
      padding: 1px 0;
    }
    .dow-cell.sun { color: #f87171; }
    .dow-cell.sat { color: #93c5fd; }

    /* DAY GRID */
    .day-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }

    .day-cell {
      aspect-ratio: 1;
      border-radius: 2px;
      cursor: pointer;
      transition: transform 0.08s, opacity 0.1s;
      position: relative;
    }
    .day-cell:active { transform: scale(0.85); }

    .day-cell.empty {
      background: transparent;
      cursor: default;
      pointer-events: none;
    }

    .day-cell.l0 { background: var(--surface2); }
    .day-cell.l1 { background: var(--blue1); }
    .day-cell.l2 { background: var(--blue2); }
    .day-cell.l3 { background: var(--blue3); }
    .day-cell.l4 { background: var(--blue4); }

    .day-cell.today::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 4px;
      border: 2px solid var(--accent);
      pointer-events: none;
    }

    .day-cell:hover:not(.empty) { opacity: 0.75; }

    @media (max-width: 900px) {
      .year-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .year-grid { grid-template-columns: repeat(2, 1fr); padding: 0.6rem; }
      header { flex-wrap: wrap; padding: 0.5rem 0.8rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1><span>Assong</span>'s Step Up Tracker</h1>
    <div class="stats-inline">
      <div class="stat-pill"><strong id="stat-total">0</strong> logs</div>
      <div class="stat-div"></div>
      <div class="stat-pill"><strong id="stat-days">0</strong> active days</div>
      <div class="stat-div"></div>
      <div class="stat-pill"><strong id="stat-streak">0</strong> streak</div>
      <div class="stat-div"></div>
      <div class="stat-pill"><strong id="stat-best">0</strong> best</div>
      <div class="stat-div"></div>
      <div class="legend-inline">
        <div class="legend-dot l0"></div>
        <span class="legend-arr">›</span>
        <div class="legend-dot l1"></div>
        <span class="legend-arr">›</span>
        <div class="legend-dot l2"></div>
        <span class="legend-arr">›</span>
        <div class="legend-dot l3"></div>
        <span class="legend-arr">›</span>
        <div class="legend-dot l4"></div>
      </div>
    </div>
  </div>
  <div class="header-right">
    <div id="clock">00:00:00</div>
    <div id="date-str">Loading...</div>
    <button class="reset-btn" id="reset-btn">Reset</button>
  </div>
</header>

<div class="year-grid" id="year-grid"></div>

<script>
const MONTH_NAMES = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const DOW = ['S','M','T','W','T','F','S'];
const STORAGE_KEY = 'assong_tracker_v2';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
}

let state = loadState();
const now = new Date();
const currentYear = now.getFullYear();
const currentMonth = now.getMonth();
const currentDay = now.getDate();

function dateKey(month, day) {
  return `${currentYear}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

function daysInMonth(month) {
  return new Date(currentYear, month + 1, 0).getDate();
}

function firstDowSunday(month) {
  return new Date(currentYear, month, 1).getDay();
}

function computeStats() {
  let total = 0, activeDays = 0;
  Object.values(state).forEach(v => { total += v; if (v > 0) activeDays++; });

  let streak = 0;
  let d = new Date(currentYear, currentMonth, currentDay);
  while (true) {
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (!state[k]) break;
    streak++;
    d.setDate(d.getDate() - 1);
  }

  let best = 0, run = 0;
  const allKeys = Object.keys(state).filter(k => state[k] > 0).sort();
  allKeys.forEach((k, i) => {
    if (i === 0) { run = 1; best = 1; return; }
    const diff = (new Date(k) - new Date(allKeys[i-1])) / 86400000;
    if (diff === 1) { run++; if (run > best) best = run; }
    else run = 1;
  });

  return { total, activeDays, streak, best };
}

function renderStats() {
  const s = computeStats();
  document.getElementById('stat-total').textContent = s.total;
  document.getElementById('stat-days').textContent = s.activeDays;
  document.getElementById('stat-streak').textContent = s.streak;
  document.getElementById('stat-best').textContent = s.best;
}

function renderCalendars() {
  const grid = document.getElementById('year-grid');
  grid.innerHTML = '';

  for (let m = 0; m < 12; m++) {
    const isCurrent = m === currentMonth;
    const days = daysInMonth(m);
    const offset = firstDowSunday(m);

    let mActive = 0;
    for (let d = 1; d <= days; d++) {
      if ((state[dateKey(m, d)] || 0) > 0) mActive++;
    }

    const card = document.createElement('div');
    card.className = 'month-card' + (isCurrent ? ' is-current' : '');

    const hdr = document.createElement('div');
    hdr.className = 'month-header';
    hdr.innerHTML = `<div class="month-name">${MONTH_NAMES[m]}</div><div class="month-count">${mActive > 0 ? mActive + ' days' : ''}</div>`;
    card.appendChild(hdr);

    const dowRow = document.createElement('div');
    dowRow.className = 'dow-row';
    DOW.forEach((d, i) => {
      const c = document.createElement('div');
      c.className = 'dow-cell' + (i === 0 ? ' sun' : i === 6 ? ' sat' : '');
      c.textContent = d;
      dowRow.appendChild(c);
    });
    card.appendChild(dowRow);

    const dayGrid = document.createElement('div');
    dayGrid.className = 'day-grid';

    for (let i = 0; i < offset; i++) {
      const e = document.createElement('div');
      e.className = 'day-cell empty';
      dayGrid.appendChild(e);
    }

    for (let d = 1; d <= days; d++) {
      const k = dateKey(m, d);
      const level = state[k] || 0;
      const isToday = isCurrent && d === currentDay;
      const cell = document.createElement('div');
      cell.className = `day-cell l${level}${isToday ? ' today' : ''}`;
      cell.title = `${MONTH_NAMES[m]} ${d} · Lv ${level}`;
      cell.addEventListener('click', () => {
        state[k] = ((state[k] || 0) + 1) % 5;
        saveState(state);
        renderCalendars();
        renderStats();
      });
      dayGrid.appendChild(cell);
    }

    card.appendChild(dayGrid);
    grid.appendChild(card);
  }
}

function updateClock() {
  const n = new Date();
  const hh = String(n.getHours()).padStart(2,'0');
  const mm = String(n.getMinutes()).padStart(2,'0');
  const ss = String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
  const WD = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const MO = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('date-str').textContent =
    `${WD[n.getDay()]} ${n.getDate()} ${MO[n.getMonth()]} ${n.getFullYear()}`;
}

document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('모든 기록을 초기화할까요?')) {
    state = {};
    saveState(state);
    renderCalendars();
    renderStats();
  }
});

setInterval(updateClock, 1000);
updateClock();
renderCalendars();
renderStats();
</script>
</body>
</html>
